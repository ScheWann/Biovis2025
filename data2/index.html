<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nested Petal Plot</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Align items to top */
            flex-wrap: wrap;
            margin: 20px;
        }
        .chart-container {
            border: 1px solid #ccc;
            margin: 10px;
            padding: 15px;
        }
        #legend-container {
            border: 1px solid #ccc;
            padding: 10px;
            margin: 10px;
            max-width: 250px; /* Limit legend width */
        }
        #legend-container h4 {
            margin-top: 10px;
            margin-bottom: 5px;
            text-align: center;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }
         #legend-container svg {
            display: block;
            margin: 0 auto; /* Center legend symbols */
        }
        .tooltip {
            position: absolute;
            text-align: center;
            padding: 6px;
            font: 12px sans-serif;
            background: lightsteelblue;
            border: 0px;
            border-radius: 8px;
            pointer-events: none;
            opacity: 0;
            z-index: 10;
        }
    </style>
</head>
<body>

<h1>Hierarchical Petal Visualization</h1>

<div id="petal-chart" class="chart-container"></div>
<div id="legend-container"></div>

<!-- Load D3.js library -->
<script src="https://d3js.org/d3.v7.min.js"></script>

<!-- Load your plotting script -->
<script src="flower_plot.js"></script>

</body>
</html>
